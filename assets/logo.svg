<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>INTRE Logo</title>
  <desc>INTRE 功能层棱镜 — 三角=三层架构, 六边形=6功能模块, 核心点=Ψ(t)</desc>

  <!-- 外三角 — 三层架构 -->
  <polygon points="100,14 181,154 19,154"
    fill="none" stroke="#1F4880" stroke-width="3.2" stroke-linejoin="round"/>

  <!-- 内六边形 — 6功能模块 M1-M6 -->
  <polygon points="100,38 134,58 134,98 100,118 66,98 66,58"
    fill="none" stroke="#1F4880" stroke-width="1.6" stroke-linejoin="round" opacity="0.6"/>

  <!-- 六节点 -->
  <circle cx="100" cy="38" r="4.5" fill="#1F4880"/>
  <circle cx="134" cy="58" r="4.5" fill="#1F4880"/>
  <circle cx="134" cy="98" r="4.5" fill="#1F4880"/>
  <circle cx="100" cy="118" r="4.5" fill="#1F4880"/>
  <circle cx="66" cy="98" r="4.5" fill="#1F4880"/>
  <circle cx="66" cy="58" r="4.5" fill="#1F4880"/>

  <!-- 核心点 -->
  <circle cx="100" cy="78" r="3.5" fill="#1F4880"/>

  <!-- NSR 弧线暗示 — 三角与六边之间 -->
  <path d="M 100,28 A 66,66 0 0,1 157,127"
    fill="none" stroke="#2A5DA0" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M 157,127 A 66,66 0 0,1 43,127"
    fill="none" stroke="#3B6FB5" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <path d="M 43,127 A 66,66 0 0,1 100,28"
    fill="none" stroke="#6DA3D4" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>