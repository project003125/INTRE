<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <title>INTRE Logo</title>
  <desc>INTRE 字标 — Josefin Sans 几何无衬线，N/R 加粗 Navy 强调 Need/Result</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600');
    text { font-family: 'Josefin Sans', sans-serif; }
  </style>
  <text font-size="48" font-weight="400" letter-spacing="2" fill="#0f172a" x="0" y="44">I</text>
  <text font-size="48" font-weight="600" fill="#1F4880" x="30" y="44">N</text>
  <text font-size="48" font-weight="400" fill="#0f172a" x="78" y="44">T</text>
  <text font-size="48" font-weight="600" fill="#1F4880" x="110" y="44">R</text>
  <text font-size="48" font-weight="400" fill="#0f172a" x="148" y="44">E</text>
</svg>
