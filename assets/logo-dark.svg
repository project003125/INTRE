<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>INTRE Logo (Dark)</title>
  <desc>INTRE Logo 深色背景版</desc>

  <!-- 外三角 -->
  <polygon points="100,14 181,154 19,154"
    fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linejoin="round"/>

  <!-- 内六边形 -->
  <polygon points="100,38 134,58 134,98 100,118 66,98 66,58"
    fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- 节点 -->
  <circle cx="100" cy="38" r="4.5" fill="#ffffff"/>
  <circle cx="134" cy="58" r="4.5" fill="#ffffff"/>
  <circle cx="134" cy="98" r="4.5" fill="#ffffff"/>
  <circle cx="100" cy="118" r="4.5" fill="#ffffff"/>
  <circle cx="66" cy="98" r="4.5" fill="#ffffff"/>
  <circle cx="66" cy="58" r="4.5" fill="#ffffff"/>

  <!-- 核心点 -->
  <circle cx="100" cy="78" r="3.5" fill="#ffffff"/>
</svg>