<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>INTRE Favicon</title>
  <desc>INTRE 简化 Favicon — 三角+六边形</desc>

  <!-- 外三角 -->
  <polygon points="16,3 29,27 3,27"
    fill="none" stroke="#1F4880" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- 内六边形 -->
  <polygon points="16,10 22,13 22,19 16,22 10,19 10,13"
    fill="none" stroke="#1F4880" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>

  <!-- 核心点 -->
