<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <title>INTRE Logo + Wordmark</title>
  <desc>INTRE 完整品牌标识 — 功能层棱镜符号 + 字标</desc>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
    .brand { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 54px; font-weight: 700; fill: #1F4880; letter-spacing: -0.04em; }
    .sub { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; fill: #64748b; letter-spacing: 0.12em; font-weight: 400; }
  </style>

  <!-- Logo 符号 -->
  <g transform="translate(10, 10)">
    <!-- 外三角 -->
    <polygon points="50,7 90,77 10,77"
      fill="none" stroke="#1F4880" stroke-width="2.8" stroke-linejoin="round"/>

    <!-- 内六边形 -->
    <polygon points="50,19 67,29 67,49 50,59 33,49 33,29"
      fill="none" stroke="#1F4880" stroke-width="1.4" stroke-linejoin="round" opacity="0.6"/>

    <!-- 节点 -->
    <circle cx="50" cy="19" r="3.8" fill="#1F4880"/>
    <circle cx="67" cy="29" r="3.8" fill="#1F4880"/>
    <circle cx="67" cy="49" r="3.8" fill="#1F4880"/>
    <circle cx="50" cy="59" r="3.8" fill="#1F4880"/>
    <circle cx="33" cy="49" r="3.8" fill="#1F4880"/>
    <circle cx="33" cy="29" r="3.8" fill="#1F4880"/>

    <!-- 核心点 -->
    <circle cx="50" cy="39" r="3" fill="#1F4880"/>
  </g>

  <!-- 字标 -->
  <text class="brand" x="115" y="80">INTRE</text>
  <text class="sub" x="118" y="105">FUNCTIONAL LAYER PSYCHOLOGY</text>
</svg>