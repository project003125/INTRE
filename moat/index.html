<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOAT · 战略总纲 | INTRE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局样式（与首页保持一致） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f7fc;
            color: #1e3349;
            line-height: 1.5;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #cddeee;
            padding-bottom: 1.5rem;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #163A5F;
            line-height: 1.1;
        }
        .subhead {
            font-size: 1.2rem;
            font-weight: 400;
            color: #2f5577;
            margin-top: 0.4rem;
            border-left: 5px solid #4f8ab0;
            padding-left: 1.3rem;
            background: linear-gradient(to right, transparent, #ecf3fa);
            padding-top: 0.2rem;
            padding-bottom: 0.2rem;
        }
        .meta-badge {
            display: inline-block;
            background: #dde9f5;
            color: #1f4a72;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            margin-top: 0.8rem;
            border: 1px solid #b6d0e6;
        }
        .section-label {
            font-size: 1.8rem;
            font-weight: 500;
            color: #163A5F;
            margin: 3rem 0 1.5rem 0;
            letter-spacing: -0.01em;
        }
        .card {
            background: #ffffff;
            border-radius: 1.2rem;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 6px 16px rgba(18, 52, 86, 0.08);
            border: 1px solid #d6e3f0;
            transition: 0.2s;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .card:hover {
            box-shadow: 0 16px 24px -8px rgba(26, 67, 113, 0.12);
            border-color: #9fbede;
        }
        .card h3 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #143a5e;
            margin-bottom: 0.8rem;
        }
        .card p {
            color: #2f5577;
            font-size: 1.1rem;
        }
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 2px solid #c5d7ea;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            color: #2f5277;
            font-size: 0.95rem;
        }
        .github-link {
            background: #eef4fc;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            border: 1px solid #b3ceec;
            transition: background 0.2s;
            color: #163A5F;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 500;
        }
        .github-link:hover {
            background: #deecfd;
            border-color: #7aa9d1;
        }
        @media (max-width: 600px) {
            .container { padding: 1.5rem 1rem; }
            h1 { font-size: 2.2rem; }
            .section-label { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>MOAT · 战略总纲</h1>
            <div class="subhead">思想遗产锚定 · 五大工程体系 · 两出口机制</div>
            <span class="meta-badge"><i class="fas fa-chess-queen" style="margin-right: 0.3rem;"></i>内容待完善</span>
        </header>

        <!-- 导航回首页 -->
        <div style="margin-bottom: 2rem;">
            <a href="../index.html" style="color: #2f5577; text-decoration: none;"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>

        <!-- 占位内容 -->
        <section>
            <div class="card">
                <h3><i class="fas fa-hourglass-half" style="margin-right: 0.5rem; color:#356f9c;"></i>内容筹备中</h3>
                <p>MOAT 战略总纲的详细内容正在整理，敬请期待。</p>
                <p style="margin-top: 1rem; font-size: 0.9rem;">如需查阅完整文档，请访问 GitHub 仓库或预印本。</p>
            </div>
        </section>

        <!-- 页脚 -->
        <footer>
            <div class="copyright">
                © 2026 INTRE 项目 · 以 CC0 公开
            </div>
            <a href="https://github.com/project003125/INTRE" target="_blank" class="github-link">
                <i class="fab fa-github"></i> GitHub 仓库
            </a>
        </footer>
    </div>
</body>
</html>
